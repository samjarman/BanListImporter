<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <script src="popup.js"></script>
    <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
    <header>
        <div>
            <h1>Ban List Importer</h1>
            <p>For entering terms in bulk</p>
        </div>
    </header>
    <label for="ban-content">Terms to block</label>
    <p class="field-help">Paste comma-separated terms or put each term on a new line.</p>
    <textarea id="ban-content" rows="8" placeholder="word1, word2&#10;word3"></textarea>
    <fieldset class="privacy-options">
        <legend>Privacy</legend>
        <label>
            <input type="radio" name="term-privacy" value="public" checked>
            <span>Public</span>
        </label>
        <label>
            <input type="radio" name="term-privacy" value="private">
            <span>Private</span>
        </label>
    </fieldset>
    <button id="ban-button" type="submit">Ban!</button>
    <p id="status" role="status" aria-live="polite"></p>
    <p id="footer-text">This is an experimental tool that is not sponsored, endorsed, administered by, or associated with Twitch and may stop working at any time. <a href="https://www.samjarman.co.nz/blog/ban-list-importer" target="_blank">More info.</a></p>
</body>
</html>
